    function renderCategories(searchTerm = "") {
      const container = document.getElementById("categories-container");
      const emptyState = document.getElementById("empty-state");
      container.innerHTML = "";
      
      let hasResults = false;
      const searchLower = searchTerm.toLowerCase();

      Object.entries(grammarData).forEach(([category, data]) => {
        const filteredEndings = data.endings.filter(item => {
          if (!searchTerm) return true;
          return (
            item.ending.toLowerCase().includes(searchLower) ||
            item.translation.toLowerCase().includes(searchLower) ||
            item.usage.toLowerCase().includes(searchLower) ||
            item.examples.some(ex => 
              ex.korean.includes(searchTerm) || 
              ex.english.toLowerCase().includes(searchLower) ||
              ex.romanization.toLowerCase().includes(searchLower)
            )
          );
        });

        if (filteredEndings.length === 0) return;
        hasResults = true;

        const colors = colorMap[data.color] || colorMap.pink;

        const categorySection = document.createElement("div");
        categorySection.className = "animate-slide-up";
        categorySection.innerHTML = `
          <div class="category-title rounded-2xl p-4 mb-4 shadow-sm">
            <h2 class="app-font text-xl font-bold text-pink-800 flex items-center gap-3">
              <span class="text-2xl">${data.icon}</span>
              ${category}
              <span class="text-sm font-normal text-pink-600 bg-white/50 px-2 py-1 rounded-full">${filteredEndings.length} endings</span>
            </h2>
          </div>
          <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-3">
            ${filteredEndings.map((item, idx) => `
              <button 
                class="card-hover ${colors.cardBg} ${colors.border} border-2 rounded-xl p-4 text-left transition-all duration-200 cursor-pointer group"
                data-category="${category}"
                data-index="${data.endings.indexOf(item)}"
              >
                <div class="korean-text text-lg font-bold ${colors.text} group-hover:scale-105 transition-transform">${item.ending}</div>
                <div class="app-font text-xs text-gray-500 mt-2 line-clamp-2">${item.translation}</div>
              </button>
            `).join("")}
          </div>
        `;
        container.appendChild(categorySection);
      });

      emptyState.classList.toggle("hidden", hasResults);
      container.classList.toggle("hidden", !hasResults);
    }

    function showModal(category, index) {
      const item = grammarData[category].endings[index];
      const colors = colorMap[grammarData[category].color] || colorMap.pink;

      document.getElementById("modal-ending").textContent = item.ending;
      document.getElementById("modal-translation").textContent = item.translation;
      document.getElementById("modal-usage").textContent = item.usage;
      document.getElementById("modal-tip").textContent = item.tip;

      const examplesContainer = document.getElementById("modal-examples");
      examplesContainer.innerHTML = item.examples.map(ex => `
        <div class="bg-white rounded-lg p-3 border border-blue-100">
          <div class="korean-text text-blue-800 font-medium">${ex.korean}</div>
          <div class="text-xs text-blue-500 app-font">${ex.romanization}</div>
          <div class="text-sm text-gray-600 app-font mt-1">${ex.english}</div>
        </div>
      `).join("");

      const overlay = document.getElementById("modal-overlay");
      overlay.classList.remove("hidden");
      overlay.classList.add("flex");
    }

    function hideModal() {
      const overlay = document.getElementById("modal-overlay");
      overlay.classList.add("hidden");
      overlay.classList.remove("flex");
    }

    // Event listeners
    document.getElementById("categories-container").addEventListener("click", (e) => {
      const card = e.target.closest("button[data-category]");
      if (card) {
        showModal(card.dataset.category, parseInt(card.dataset.index));
      }
    });

    document.getElementById("modal-close").addEventListener("click", hideModal);
    document.getElementById("modal-overlay").addEventListener("click", (e) => {
      if (e.target === e.currentTarget) hideModal();
    });

    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape") hideModal();
    });

    let searchTimeout;
    document.getElementById("search-input").addEventListener("input", (e) => {
      clearTimeout(searchTimeout);
      searchTimeout = setTimeout(() => {
        renderCategories(e.target.value.trim());
      }, 200);
